<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Royale — Agent Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: rgba(15, 23, 42, 0.8);
            --border: rgba(255,255,255,0.08);
            --text: #e2e8f0;
            --text-dim: #64748b;
            --accent: #818cf8;
            --accent-glow: 0 0 20px rgba(129,140,248,0.3);
            --green: #34d399;
            --yellow: #fbbf24;
            --red: #f87171;
            --blue: #60a5fa;
            --purple: #a78bfa;
            --cyan: #22d3ee;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
            z-index: 0;
            animation: bgDrift 20s ease-in-out infinite alternate;
        }
        @keyframes bgDrift {
            0% { transform: translate(0,0) rotate(0deg); }
            100% { transform: translate(-2%,1%) rotate(2deg); }
        }
        .container {
            position: relative; z-index: 1;
            max-width: 1400px; margin: 0 auto;
            padding: 30px 24px;
        }

        /* Header */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
        }
        .header h1 {
            font-size: 28px; font-weight: 800;
            background: linear-gradient(135deg, #818cf8, #a78bfa, #c084fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .header-meta {
            display: flex; align-items: center; gap: 16px;
        }
        .refresh-btn {
            background: rgba(129,140,248,0.15); border: 1px solid rgba(129,140,248,0.3);
            color: var(--accent); border-radius: 8px; padding: 8px 16px;
            cursor: pointer; font-size: 13px; font-weight: 500;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            background: rgba(129,140,248,0.3); box-shadow: var(--accent-glow);
        }
        .last-update { font-size: 12px; color: var(--text-dim); }

        /* Stats row */
        .stats-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 32px;
        }
        .stat-card {
            background: var(--surface); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; transition: transform 0.2s, box-shadow 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .stat-value { font-size: 32px; font-weight: 800; }
        .stat-value.green { color: var(--green); }
        .stat-value.yellow { color: var(--yellow); }
        .stat-value.blue { color: var(--blue); }
        .stat-value.purple { color: var(--purple); }

        /* Progress bar */
        .progress-wrap { margin-top: 10px; }
        .progress-bar {
            height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden;
        }
        .progress-fill {
            height: 100%; border-radius: 3px;
            background: linear-gradient(90deg, var(--accent), var(--purple));
            transition: width 0.6s ease;
        }
        .progress-text { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

        /* Agents grid */
        .section-title {
            font-size: 18px; font-weight: 700; margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }
        .agents-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px; margin-bottom: 32px;
        }
        .agent-card {
            background: var(--surface); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; transition: all 0.2s;
        }
        .agent-card:hover { border-color: rgba(129,140,248,0.3); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .agent-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .agent-name { font-weight: 700; font-size: 15px; }
        .agent-id { font-size: 11px; color: var(--text-dim); }
        .status-badge {
            padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .status-idle { background: rgba(100,116,139,0.2); color: #94a3b8; }
        .status-assigned { background: rgba(251,191,36,0.15); color: var(--yellow); }
        .status-working { background: rgba(96,165,250,0.15); color: var(--blue); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
        .agent-task { margin-top: 10px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px; }
        .agent-task-label { font-size: 11px; color: var(--text-dim); margin-bottom: 4px; }
        .agent-task-id { font-size: 13px; font-weight: 500; color: var(--cyan); word-break: break-all; }
        .agent-area { font-size: 11px; color: var(--purple); margin-top: 4px; }
        .agent-time { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

        /* Tasks table */
        .tasks-section { margin-bottom: 32px; }
        .tasks-filters {
            display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
        }
        .filter-btn {
            padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border);
            background: transparent; color: var(--text-dim); cursor: pointer;
            font-size: 12px; font-weight: 500; transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover {
            background: rgba(129,140,248,0.15); color: var(--accent); border-color: rgba(129,140,248,0.3);
        }
        .tasks-list { display: flex; flex-direction: column; gap: 8px; max-height: 500px; overflow-y: auto; }
        .task-row {
            display: grid; grid-template-columns: 1fr 100px 100px 80px;
            gap: 12px; padding: 12px 16px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 8px; align-items: center;
            font-size: 13px;
        }
        .task-title { font-weight: 500; }
        .task-area { color: var(--purple); font-size: 12px; }
        .task-status { text-align: center; }
        .task-risk { text-align: center; font-size: 12px; }
        .risk-low { color: var(--green); }
        .risk-medium { color: var(--yellow); }
        .risk-high { color: var(--red); }

        /* Loading */
        .loading {
            text-align: center; padding: 60px;
            color: var(--text-dim); font-size: 14px;
        }
        .spinner {
            width: 40px; height: 40px; margin: 0 auto 16px;
            border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        /* Nav link */
        .nav-link {
            color: var(--accent); text-decoration: none; font-size: 13px;
            transition: color 0.2s;
        }
        .nav-link:hover { color: #a5b4fc; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🎱 Ball Royale — Agent Dashboard</h1>
                <div style="margin-top:6px; display:flex; gap:16px;">
                    <a href="index.html" class="nav-link">← Battle Visualizer</a>
                    <a href="https://github.com/Koteyka371/ball-royale/actions" target="_blank" class="nav-link">GitHub Actions ↗</a>
                    <a href="https://github.com/Koteyka371/ball-royale/pulls" target="_blank" class="nav-link">Pull Requests ↗</a>
                </div>
            </div>
            <div class="header-meta">
                <span class="last-update" id="lastUpdate">Loading...</span>
                <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
            </div>
        </div>

        <div class="stats-row" id="statsRow">
            <div class="stat-card"><div class="stat-label">Total Tasks</div><div class="stat-value" id="statTotal">—</div></div>
            <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-value green" id="statDone">—</div><div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><div class="progress-text" id="progressText">—</div></div></div>
            <div class="stat-card"><div class="stat-label">Remaining</div><div class="stat-value yellow" id="statTodo">—</div></div>
            <div class="stat-card"><div class="stat-label">Active Agents</div><div class="stat-value blue" id="statActive">—</div></div>
        </div>

        <div class="section-title">🤖 Agents</div>
        <div class="agents-grid" id="agentsGrid">
            <div class="loading"><div class="spinner"></div>Loading agent data...</div>
        </div>

        <div class="tasks-section">
            <div class="section-title">📋 Tasks</div>
            <div class="tasks-filters" id="tasksFilters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="todo">Todo</button>
                <button class="filter-btn" data-filter="done">Done</button>
                <button class="filter-btn" data-filter="in_progress">In Progress</button>
            </div>
            <div class="tasks-list" id="tasksList">
                <div class="loading"><div class="spinner"></div>Loading tasks...</div>
            </div>
        </div>
    </div>

    <script>
        const REPO = "Koteyka371/ball-royale";
        const RAW = `https://raw.githubusercontent.com/${REPO}/main`;

        let allTasks = [];
        let currentFilter = "all";

        async function fetchJSON(filename) {
            const resp = await fetch(`${RAW}/${filename}?t=${Date.now()}`);
            if (!resp.ok) throw new Error(`Failed: ${filename}`);
            return resp.json();
        }

        function timeAgo(iso) {
            if (!iso) return "—";
            const diff = (Date.now() - new Date(iso).getTime()) / 1000;
            if (diff < 60) return `${Math.floor(diff)}s ago`;
            if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
            if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
            return `${Math.floor(diff/86400)}d ago`;
        }

        function statusClass(s) {
            if (s === "idle") return "status-idle";
            if (s === "assigned") return "status-assigned";
            if (s === "working") return "status-working";
            return "status-idle";
        }

        function renderAgents(lockData) {
            const grid = document.getElementById("agentsGrid");
            const agents = lockData.agents || {};
            const entries = Object.entries(agents).sort((a,b) => a[0].localeCompare(b[0]));

            let active = 0;
            let html = "";

            for (const [id, info] of entries) {
                const status = info.status || "idle";
                if (status === "working" || status === "assigned") active++;

                html += `
                <div class="agent-card">
                    <div class="agent-header">
                        <div>
                            <div class="agent-name">${info.name || id}</div>
                            <div class="agent-id">${id} · ${info.area || "—"}</div>
                        </div>
                        <span class="status-badge ${statusClass(status)}">${status}</span>
                    </div>
                    ${info.task_id ? `
                    <div class="agent-task">
                        <div class="agent-task-label">Current Task</div>
                        <div class="agent-task-id">${info.task_id}</div>
                        <div class="agent-time">Started: ${timeAgo(info.started_at)}</div>
                    </div>` : `<div style="color:var(--text-dim);font-size:12px;margin-top:8px;">No active task</div>`}
                    <div class="agent-area">Cycles today: ${info.cycles_today ?? 0}</div>
                </div>`;
            }

            grid.innerHTML = html;
            document.getElementById("statActive").textContent = active;
        }

        function renderTasks(tasksData) {
            allTasks = tasksData.tasks || [];
            const total = allTasks.length;
            const done = allTasks.filter(t => t.status === "done").length;
            const todo = allTasks.filter(t => t.status === "todo").length;
            const pct = total > 0 ? Math.round(done / total * 100) : 0;

            document.getElementById("statTotal").textContent = total;
            document.getElementById("statDone").textContent = done;
            document.getElementById("statTodo").textContent = todo;
            document.getElementById("progressFill").style.width = pct + "%";
            document.getElementById("progressText").textContent = `${pct}% complete (${done}/${total})`;

            filterTasks();
        }

        function filterTasks() {
            const list = document.getElementById("tasksList");
            let filtered = allTasks;
            if (currentFilter !== "all") {
                filtered = allTasks.filter(t => t.status === currentFilter);
            }

            if (filtered.length === 0) {
                list.innerHTML = `<div style="text-align:center;color:var(--text-dim);padding:30px;">No tasks match filter</div>`;
                return;
            }

            list.innerHTML = filtered.slice(0, 50).map(t => `
                <div class="task-row">
                    <div>
                        <div class="task-title">${t.title || t.id}</div>
                        <div class="task-area">${t.area || "—"}</div>
                    </div>
                    <div class="task-status"><span class="status-badge ${statusClass(t.status === "todo" ? "idle" : t.status === "done" ? "idle" : "working")}" style="${t.status === 'done' ? 'background:rgba(52,211,153,0.15);color:var(--green)' : ''}">${t.status}</span></div>
                    <div class="task-risk ${t.risk ? 'risk-' + t.risk : ''}">${t.risk || "—"}</div>
                </div>
            `).join("");
        }

        // Filter buttons
        document.getElementById("tasksFilters").addEventListener("click", e => {
            if (!e.target.classList.contains("filter-btn")) return;
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            e.target.classList.add("active");
            currentFilter = e.target.dataset.filter;
            filterTasks();
        });

        async function loadAll() {
            try {
                const [lockData, tasksData] = await Promise.all([
                    fetchJSON("agent_lock.json"),
                    fetchJSON("agent_tasks.json")
                ]);
                renderAgents(lockData);
                renderTasks(tasksData);
                document.getElementById("lastUpdate").textContent = `Updated: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                console.error(err);
                document.getElementById("lastUpdate").textContent = `Error: ${err.message}`;
            }
        }

        loadAll();
        setInterval(loadAll, 60000); // Auto-refresh every 60s
    </script>
</body>
</html>
