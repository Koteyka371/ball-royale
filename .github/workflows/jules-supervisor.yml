name: Jules Supervisor

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_run:
    workflows: ["CI Validation"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: supervisor
  cancel-in-progress: false

jobs:
  supervise:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Run Supervisor
        run: python3 scripts/supervisor.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}

      - name: Show status
        if: always()
        run: python3 scripts/status_agents.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
