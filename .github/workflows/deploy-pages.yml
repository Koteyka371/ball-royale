name: Deploy Visualizer to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'visualizer/**'
      - 'tests/simulate_battle.py'
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Copy Python files for WASM simulator
        run: |
          mkdir -p visualizer/data/ai
          mkdir -p visualizer/data/tests
          cp src/ai/ball_brain.py    visualizer/data/ai/
          cp src/ai/perception.py    visualizer/data/ai/
          cp src/ai/emotion.py       visualizer/data/ai/
          cp src/ai/decision.py      visualizer/data/ai/
          cp src/ai/action.py        visualizer/data/ai/
          cp tests/simulate_battle.py visualizer/data/tests/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'visualizer'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
