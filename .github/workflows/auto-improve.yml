name: Auto-Improve

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

concurrency:
  group: auto-improve
  cancel-in-progress: false

jobs:
  analyze-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Auto-Improvement Loop
        run: python3 scripts/auto_improve_loop.py

      - name: Run Auto-Balance Self-Play Simulation
        run: python3 scripts/auto_balance.py

      - name: Run Python-GDScript Sync Check
        run: python3 scripts/check_sync.py

      - name: Run Genetic Parameter Mutation Tuner
        run: python3 scripts/genetic_mutate.py

      - name: Run Performance Profiler
        run: python3 scripts/auto_profile.py

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure git
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH="auto/improve-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add scripts/ docs/ src/ tests/ agent_tasks.json
          git commit -m "auto: project analysis and improvement"
          git push origin "$BRANCH"
          gh pr create \
            --title "[Auto] Task generation $(date +%Y-%m-%d)" \
            --body "Auto-generated tasks from project analysis" \
            --branch "$BRANCH" \
            --label automated
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
