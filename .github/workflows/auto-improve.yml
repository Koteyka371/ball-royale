name: Auto-Improve

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

concurrency:
  group: auto-improve
  cancel-in-progress: false

jobs:
  analyze-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Run project analysis
        run: python3 scripts/analyze_project.py || true

      - name: Run AI behavior tests
        run: python3 scripts/test_ai_behaviors.py || true

      - name: Generate new ideas
        run: python3 scripts/generate_ideas.py || true

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH="auto/improve-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add scripts/ docs/ src/ tests/ agent_tasks.json
          git commit -m "auto: project analysis and improvement"
          git push origin "$BRANCH"
          gh pr create \
            --title "[Auto] Task generation $(date +%Y-%m-%d)" \
            --body "Auto-generated tasks from project analysis" \
            --branch "$BRANCH" \
            --label automated
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
