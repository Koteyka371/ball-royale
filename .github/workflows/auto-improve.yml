name: Auto-Improve

on:
  schedule:
    - cron: '0 10 * * *'  # Every day at 10:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  analyze-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run project analysis
        run: python scripts/analyze_project.py

      - name: Run AI behavior tests
        run: python scripts/test_ai_behaviors.py

      - name: Generate new ideas
        run: python scripts/generate_ideas.py

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          BRANCH="auto/improve-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "auto: generate new tasks from game_design.md"
          git push origin "$BRANCH"
          gh pr create \
            --title "[Auto] Task generation $(date +%Y-%m-%d)" \
            --body "Auto-generated tasks from project analysis" \
            --branch "$BRANCH" \
            --label automated
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
