name: Auto-Improve

on:
  schedule:
    - cron: '0 10 * * *'  # Every day at 10:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  analyze-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run project analysis
        run: python scripts/analyze_project.py

      - name: Run AI behavior tests
        run: python scripts/test_ai_behaviors.py

      - name: Generate new ideas
        run: python scripts/generate_ideas.py

      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'auto: generate new tasks from game_design.md'
          title: '[Auto] Weekly task generation'
          body: |
            ## Auto-generated tasks
            
            This PR was created automatically by the project analysis system.
            
            ### Changes:
            - New tasks generated from `docs/game_design.md`
            - Project statistics updated
            
            ### Next steps:
            - Review new tasks in `agent_tasks.json`
            - Prioritize based on project goals
            - Start implementing!
          branch: auto/improve-tasks
          labels: automated
