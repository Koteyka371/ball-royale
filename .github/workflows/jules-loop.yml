name: Jules Infinite Loop

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get next task and invoke Jules
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          # Get next task
          TASK_INFO=$(python3 -c "
          import json
          with open('agent_tasks.json') as f:
              data = json.load(f)
          tasks = [t for t in data.get('tasks', []) if t.get('status') == 'todo']
          if tasks:
              task = tasks[0]
              print(task['id'] + '|' + task['title'] + '|' + task.get('description', 'No description'))
          else:
              print('generate-ideas|Generate new tasks|No tasks left')
          ")
          
          TASK_ID=$(echo "$TASK_INFO" | cut -d'|' -f1)
          TASK_TITLE=$(echo "$TASK_INFO" | cut -d'|' -f2)
          TASK_DESC=$(echo "$TASK_INFO" | cut -d'|' -f3)
          
          echo "Task: $TASK_TITLE"
          
          if [ -z "$JULES_API_KEY" ]; then
            echo "ERROR: JULES_API_KEY is not set!"
            exit 1
          fi
          
          # Invoke Jules with SELF-IMPROVEMENT prompt
          curl -s -X POST 'https://jules.googleapis.com/v1alpha/sessions' \
            -H 'Content-Type: application/json' \
            -H "x-goog-api-key: $JULES_API_KEY" \
            -d "{
              \"prompt\": \"You are working on Ball Royale - a 2D battle royale game with AI-controlled balls.\n\n## CURRENT TASK\nTitle: $TASK_TITLE\nDescription: $TASK_DESC\n\n## RULES\n1. Read AGENTS.md first for project instructions\n2. Read docs/game_design.md for full game design\n3. All balls are AI-controlled - player only observes\n4. Write clean code with tests\n\n## CRITICAL: YOU MUST DO BOTH THINGS\n\n### Part 1: Complete the current task\n- Implement the feature described above\n- Write tests for it\n- Update agent_tasks.json: change the task status from 'todo' to 'done'\n\n### Part 2: Generate NEW tasks for the next cycle\nThis is MANDATORY. The project must be self-improving.\n\nAfter completing the current task:\n1. Read docs/game_design.md and find features that are NOT yet implemented\n2. Generate 3-5 NEW tasks based on unimplemented features\n3. Add new tasks to the 'tasks' array in agent_tasks.json with status 'todo'\n\nEach new task MUST have this exact format:\n{\n  \"id\": \"unique-kebab-case-id\",\n  \"status\": \"todo\",\n  \"area\": \"ai-core|ai-ball-types|ai-behaviors|game-modes|skills|arena\",\n  \"risk\": \"low|medium\",\n  \"title\": \"Short title\",\n  \"description\": \"Detailed description\",\n  \"allowed_paths\": [\"src/**\", \"tests/**\"],\n  \"acceptance\": [\"criteria1\", \"criteria2\", \"criteria3\"]\n}\n\nExamples of good tasks to generate:\n- Implement [ball type] AI profile (Warrior, Tank, Assassin, Healer, Sniper, etc.)\n- Implement [behavior] (patrol, flank, ambush, retreat, etc.)\n- Implement [game mode] (Team Battle, Racing, Survival, etc.)\n- Implement [skill] (dash, shield, heal, etc.)\n\n### Part 3: Create a PR\nYour PR MUST include BOTH:\n- The completed feature code\n- The updated agent_tasks.json with new tasks\n\n## IMPORTANT\nIf you do not generate new tasks, the loop will stop and the project will die.\nThe whole point is that after each task, you create work for the next Jules run.\",
              \"sourceContext\": {
                \"source\": \"sources/github/Koteyka371/ball-royale\",
                \"githubRepoContext\": {
                  \"startingBranch\": \"main\"
                }
              },
              \"automationMode\": \"AUTO_CREATE_PR\",
              \"title\": \"Task: $TASK_TITLE\"
            }"
          
          echo "Jules invoked with self-improvement prompt"
