name: Jules Infinite Loop

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get next task
        id: task
        run: |
          TASK=$(python3 -c "
          import json
          with open('agent_tasks.json') as f:
              data = json.load(f)
          tasks = [t for t in data.get('tasks', []) if t.get('status') == 'todo']
          if tasks:
              task = tasks[0]
              print(f'{task[\"id\"]}|{task[\"title\"]}|{task[\"description\"]}')
          else:
              print('generate-ideas|Generate new tasks|Read game_design.md and generate new tasks')
          ")
          
          IFS='|' read -r TASK_ID TASK_TITLE TASK_DESC <<< "$TASK"
          echo "task_id=$TASK_ID" >> $GITHUB_OUTPUT
          echo "task_title=$TASK_TITLE" >> $GITHUB_OUTPUT

      - name: Invoke Jules via API
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          curl -X POST 'https://jules.googleapis.com/v1alpha/sessions' \
            -H 'Content-Type: application/json' \
            -H "x-goog-api-key: $JULES_API_KEY" \
            -d '{
              "prompt": "You are working on Ball Royale game.\n\nCURRENT TASK: ${{ steps.task.outputs.task_title }}\n\nIMPORTANT RULES:\n1. Read AGENTS.md first\n2. Read docs/game_design.md\n3. All balls are AI-controlled\n4. Write code with tests\n5. Update agent_tasks.json (set status to done)\n6. Generate 2-3 new tasks\n7. Create a PR with changes",
              "sourceContext": {
                "source": "sources/github/Koteyka371/ball-royale",
                "githubRepoContext": {
                  "startingBranch": "main"
                }
              },
              "automationMode": "AUTO_CREATE_PR",
              "title": "Task: ${{ steps.task.outputs.task_title }}"
            }'

      - name: Mark task as done
        if: success()
        run: |
          TASK_ID="${{ steps.task.outputs.task_id }}"
          if [ "$TASK_ID" != "generate-ideas" ]; then
            python3 << EOF
          import json
          
          with open('agent_tasks.json', 'r') as f:
              data = json.load(f)
          
          for task in data.get('tasks', []):
              if task.get('id') == '$TASK_ID':
                  task['status'] = 'done'
                  break
          
          with open('agent_tasks.json', 'w') as f:
              json.dump(data, f, indent=2, ensure_ascii=False)
          
          print(f"Marked task $TASK_ID as done")
          EOF
          fi
