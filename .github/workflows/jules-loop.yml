name: Jules Infinite Loop

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get next task and invoke Jules
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          TASK_INFO=$(python3 -c "
          import json
          with open('agent_tasks.json') as f:
              data = json.load(f)
          tasks = [t for t in data.get('tasks', []) if t.get('status') == 'todo']
          if tasks:
              task = tasks[0]
              print(task['id'] + '|' + task['title'] + '|' + task.get('description', 'No description'))
          else:
              print('self-evolve|Improve the project|No tasks left - improve everything')
          ")
          
          TASK_ID=$(echo "$TASK_INFO" | cut -d'|' -f1)
          TASK_TITLE=$(echo "$TASK_INFO" | cut -d'|' -f2)
          TASK_DESC=$(echo "$TASK_INFO" | cut -d'|' -f3)
          
          echo "Task: $TASK_TITLE"
          
          if [ -z "$JULES_API_KEY" ]; then
            echo "ERROR: JULES_API_KEY is not set!"
            exit 1
          fi
          
          curl -s -X POST 'https://jules.googleapis.com/v1alpha/sessions' \
            -H 'Content-Type: application/json' \
            -H "x-goog-api-key: $JULES_API_KEY" \
            -d '{
              "prompt": "You are an autonomous AI developer. You can modify ANY file in this project.\n\nThere are NO restrictions on what you can change. You can:\n- Modify any .py, .gd, .yml, .json, .md file\n- Create new files anywhere in the project\n- Delete or rewrite files that are bad\n- Change workflow configs, scripts, docs, tests, game code\n- Improve your own prompts and automation\n\n## CURRENT TASK\nTitle: '"$TASK_TITLE"'\nDescription: '"$TASK_DESC"'\n\n## WORKFLOW\n\n1. READ the project: AGENTS.md, docs/game_design.md, src/, tests/, scripts/, configs/\n2. UNDERSTAND what exists and what needs improvement\n3. COMPLETE the current task\n4. SELF-IMPROVE: after the task, improve something else that will make the next Jules run better\n5. RUN validation: python3 tests/simulate_battle.py 100 && python3 scripts/quality_metrics.py\n6. UPDATE agent_tasks.json: mark task done + add 3-5 new tasks\n7. CREATE PR with everything\n\n## WHAT TO IMPROVE (pick freely)\n\nYou are NOT limited to the current task. After completing it, look at the project and improve whatever you think will help most:\n\n- Better AI behaviors (flanking, retreating, formations, swarm)\n- New ball types or skills\n- Better tests or more coverage\n- Faster performance\n- Better code structure\n- New scripts or tools\n- Better documentation\n- Improved CI/CD\n- Fix any bugs you find\n- Optimize anything that is slow\n- Add error handling\n- Refactor bad code\n- Write new automation\n- Improve your own prompts in .github/workflows/\n- Add new configs or game mechanics\n- Anything else that makes the project better\n\n## RULES\n- Tests must pass after your changes\n- Each task in agent_tasks.json gets its own PR\n- Generate 3-5 new tasks after each completed one\n- Think: what would make the NEXT Jules run more productive?\n- Be creative. Invent new features. Push boundaries.\n- If you see something broken, fix it even if it is not in the task.\n- You have FULL freedom to change any file.",