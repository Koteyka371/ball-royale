name: Jules Infinite Loop

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get next task and invoke Jules
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
        run: |
          # Get next task
          TASK_INFO=$(python3 -c "
          import json
          with open('agent_tasks.json') as f:
              data = json.load(f)
          tasks = [t for t in data.get('tasks', []) if t.get('status') == 'todo']
          if tasks:
              task = tasks[0]
              print(task['id'] + '|' + task['title'] + '|' + task.get('description', 'No description'))
          else:
              print('generate-ideas|Generate new tasks|Read game_design.md and generate new tasks')
          ")
          
          TASK_ID=$(echo "$TASK_INFO" | cut -d'|' -f1)
          TASK_TITLE=$(echo "$TASK_INFO" | cut -d'|' -f2)
          TASK_DESC=$(echo "$TASK_INFO" | cut -d'|' -f3)
          
          echo "Task ID: $TASK_ID"
          echo "Task Title: $TASK_TITLE"
          
          # Check if API key exists
          if [ -z "$JULES_API_KEY" ]; then
            echo "ERROR: JULES_API_KEY is not set!"
            exit 1
          fi
          
          # Invoke Jules
          echo "Invoking Jules API..."
          curl -s -X POST 'https://jules.googleapis.com/v1alpha/sessions' \
            -H 'Content-Type: application/json' \
            -H "x-goog-api-key: $JULES_API_KEY" \
            -d "{
              \"prompt\": \"You are working on Ball Royale game.\n\nCURRENT TASK: $TASK_TITLE\n\nDESCRIPTION: $TASK_DESC\n\nRULES:\n1. Read AGENTS.md first\n2. Read docs/game_design.md\n3. Write code with tests\n4. Update agent_tasks.json (set task status to done)\n5. Create a PR\",
              \"sourceContext\": {
                \"source\": \"sources/github/Koteyka371/ball-royale\",
                \"githubRepoContext\": {
                  \"startingBranch\": \"main\"
                }
              },
              \"automationMode\": \"AUTO_CREATE_PR\",
              \"title\": \"Task: $TASK_TITLE\"
            }"
          
          echo "Jules invoked successfully"
