name: CI Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'dispatcher:') && !contains(github.event.head_commit.message, 'supervisor:') && !contains(github.event.head_commit.message, 'Day boundary:')"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Validate task manifest
        run: python3 scripts/validate_tasks.py

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

      - name: Check code quality
        run: python3 scripts/quality_metrics.py
