name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate task manifest
        run: python scripts/validate_tasks.py agent_tasks.json

  test:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run AI behavior tests
        run: python scripts/test_ai_behaviors.py

      - name: Run pytest (if tests exist)
        run: |
          if ls tests/test_*.py 1>/dev/null 2>&1; then
            pip install pytest
            pytest tests/ -v
          else
            echo "No pytest tests yet, skipping..."
          fi
