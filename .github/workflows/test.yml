name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate task manifest
        run: python scripts/validate_tasks.py agent_tasks.json

      - name: Run AI behavior tests
        run: python scripts/test_ai_behaviors.py

      - name: Run pytest (if tests exist)
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests/*.py 2>/dev/null)" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No pytest tests found, skipping..."
          fi

      - name: Project analysis
        run: python scripts/analyze_project.py
