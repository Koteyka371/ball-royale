name: Auto Merge Jules PR

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI to complete
        run: |
          echo "Waiting 90s for CI checks to start..."
          sleep 90
          
          # Check if PR is mergeable
          MERGEABLE=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json mergeable -q '.mergeable')
          
          echo "Mergeable state: $MERGEABLE"
          
          if [ "$MERGEABLE" = "MERGEABLE" ]; then
            echo "PR is mergeable, proceeding..."
          else
            echo "PR not yet mergeable, waiting 60s more..."
            sleep 60
            
            MERGEABLE=$(gh pr view ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --json mergeable -q '.mergeable')
            
            if [ "$MERGEABLE" != "MERGEABLE" ]; then
              echo "PR still not mergeable after extra wait. Skipping."
              exit 0
            fi
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge PR
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
