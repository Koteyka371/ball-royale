name: Auto Merge Jules PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.title, 'Task:') ||
      contains(github.event.pull_request.head.ref, 'jules') ||
      contains(github.event.pull_request.head.ref, 'feat/') && contains(github.event.pull_request.title, 'Implement')
    steps:
      - name: Wait for CI
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          check-regexp: '^(validate|test|ci|CI|Test)$'
          wait-interval: 15
          allowed-conclusions: success

      - name: Enable auto-merge
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
