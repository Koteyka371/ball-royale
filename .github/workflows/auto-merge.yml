name: Auto-Merge PR (with CI check)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

concurrency:
  group: auto-merge
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status and merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let pr = context.payload.pull_request;

            if (!pr) {
              console.log('No PR in context (check_suite event), resolving PR...');
              const checkSuite = context.payload.check_suite;
              const headSha = checkSuite ? checkSuite.head_sha : null;

              if (checkSuite && checkSuite.pull_requests && checkSuite.pull_requests.length > 0) {
                const prNumber = checkSuite.pull_requests[0].number;
                const { data: resolvedPr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber
                });
                pr = resolvedPr;
              } else if (headSha) {
                console.log('Fallback: searching open PRs by head SHA...');
                const { data: openPrs } = await github.rest.pulls.list({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  head: context.repo.owner + ':' + checkSuite.head_branch,
                  per_page: 100
                });
                const matchingPr = openPrs.find(p => p.head.sha === headSha);
                if (matchingPr) {
                  pr = matchingPr;
                  console.log(`Found PR #${pr.number} by SHA fallback`);
                } else {
                  console.log('No matching PR found by SHA, skipping');
                  return;
                }
              } else {
                console.log('No PR or SHA available, skipping');
                return;
              }
            }

            if (pr.draft) {
              console.log('PR is draft, skipping auto-merge');
              return;
            }

            if (pr.mergeable === false) {
              console.log('PR has merge conflicts, skipping auto-merge');
              return;
            }

            if (pr.mergeable === null) {
              console.log('PR mergeable state unknown, waiting 30s...');
              await new Promise(r => setTimeout(r, 30000));
              const { data: refreshedPr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
              if (refreshedPr.mergeable === false) {
                console.log('PR has merge conflicts after refresh, skipping');
                return;
              }
            }

            const labels = pr.labels.map(l => l.name);
            if (!labels.includes('automated')) {
              console.log('PR has no "automated" label, skipping auto-merge');
              return;
            }

            console.log(`Checking PR #${pr.number} for auto-merge...`);

            let allCheckRuns = [];
            let page = 1;
            while (true) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
                per_page: 100,
                page: page
              });
              allCheckRuns = allCheckRuns.concat(checks.check_runs);
              if (checks.check_runs.length < 100) break;
              page++;
            }

            const blocking = ['failure', 'timed_out', 'cancelled', 'action_required'];
            if (allCheckRuns.length === 0) {
              console.log('No check runs found, waiting 30s...');
              await new Promise(r => setTimeout(r, 30000));
              const { data: retryChecks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
                per_page: 100
              });
              allCheckRuns = retryChecks.check_runs;
              if (allCheckRuns.length === 0) {
                console.log('Still no check runs, skipping merge');
                return;
              }
            }

            for (const run of allCheckRuns) {
              if (blocking.includes(run.conclusion)) {
                console.log(`CI failed: ${run.name} (${run.conclusion})`);
                return;
              }
              if (run.status !== 'completed') {
                console.log(`CI still running: ${run.name} (${run.status})`);
                return;
              }
            }

            console.log('All CI checks passed! Waiting 30s for stability...');
            await new Promise(r => setTimeout(r, 30000));

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: 'squash'
              });
              console.log('PR merged successfully!');
            } catch (error) {
              console.error(`Merge failed: ${error.message}`);
              core.setFailed(error.message);
            }
