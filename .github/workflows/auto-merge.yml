name: Auto Merge Jules PR

on:
  pull_request:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Wait 30s for CI to start
        run: sleep 30

      - name: Merge PR
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
