name: Auto-Merge PR (with CI check)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Check CI status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);
            if (!labels.includes('automated')) {
              console.log('PR has no "automated" label, skipping auto-merge');
              return;
            }

            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
              per_page: 30
            });

            const blocking = ['failure', 'timed_out', 'cancelled', 'action_required', 'stale'];
            for (const run of checks.check_runs) {
              if (blocking.includes(run.conclusion)) {
                console.log(`CI failed: ${run.name} (${run.conclusion})`);
                return;
              }
              if (run.status !== 'completed') {
                console.log(`CI still running: ${run.name} (${run.status})`);
                return;
              }
            }

            console.log('CI passed, waiting 30s for stability...');
            await new Promise(r => setTimeout(r, 30000));

            console.log('Merging PR...');
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              merge_method: 'squash'
            });
            console.log('PR merged successfully!');
